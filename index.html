<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武汉大学国家网络安全学院 - 专业学习互助平台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f8fa 0%, #e9f0f5 100%);
        }
        
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 0 20px;
        }
        
        .hero h1 {
            font-size: 3.5em;
            color: #1a56db;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .hero h2 {
            font-size: 1.8em;
            color: #4a5568;
            margin-bottom: 40px;
            font-weight: normal;
        }
        
        .enter-btn {
            display: inline-block;
            padding: 20px 50px;
            background-color: #1a56db;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(26, 86, 219, 0.3);
        }
        
        .enter-btn:hover {
            background-color: #1543a0;
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(26, 86, 219, 0.4);
        }
        
        .footer {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero">
            <h1>武汉大学国家网络安全学院</h1>
            <h2>专业学习互助平台</h2>
            <a href="login.html" class="enter-btn">点击进入</a>
        </div>
        <div class="footer">
            <p>© 2026 武汉大学国家网络安全学院</p>
        </div>
    </div>
</body>
</html>
