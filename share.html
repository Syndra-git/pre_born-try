<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源分享 - 武汉大学国家网络安全学院</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
    <script>
        // 检查登录状态
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }
        };
    </script>
    <style>
        .content-options {
            margin-top: 10px;
        }
        .option {
            margin-bottom: 15px;
        }
        .option input[type="radio"] {
            margin-right: 8px;
        }
        .option label {
            margin-right: 15px;
            font-weight: normal;
        }
        .option textarea,
        .option input[type="file"] {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .option textarea {
            height: 200px;
            resize: vertical;
        }
        .file-note {
            margin-top: 5px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="navbar-container">
                <ul>
                    <li><a href="resources.html">学习资源查询</a></li>
                    <li><a href="share.html">资源分享</a></li>
                    <li><a href="group.html">参与互助小组</a></li>
                </ul>
            </div>
        </nav>
        <div class="header">
            <h1>武汉大学国家网络安全学院</h1>
            <h2>专业学习互助平台</h2>
        </div>
        <div class="content">
            <div class="form-section">
                <h2>资源分享</h2>
                <form onsubmit="submitShare(event)">
                    <div class="form-group">
                        <label for="course-name">课程名称</label>
                        <input type="text" id="course-name" required placeholder="请输入课程名称">
                    </div>
                    <div class="form-group">
                        <label for="share-type">分享类型</label>
                        <select id="share-type" onchange="toggleOtherOption()" required>
                            <option value="">请选择分享类型</option>
                            <option value="学习内容概述">学习内容概述</option>
                            <option value="学习方法总结">学习方法总结</option>
                            <option value="考试技巧">考试技巧</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group" id="other-type-container" style="display: none;">
                        <label for="other-type">其他类型</label>
                        <input type="text" id="other-type" placeholder="请输入具体类型">
                    </div>
                    <div class="form-group">
                        <label for="share-title">标题</label>
                        <input type="text" id="share-title" required placeholder="请输入分享标题">
                    </div>
                    <div class="form-group">
                        <label>分享内容</label>
                        <div class="content-options">
                            <div class="option">
                                <input type="radio" id="content-text" name="content-type" value="text" checked>
                                <label for="content-text">文本内容</label>
                                <textarea id="share-content" placeholder="请输入详细内容"></textarea>
                            </div>
                            <div class="option">
                                <input type="radio" id="content-file" name="content-type" value="file">
                                <label for="content-file">上传文件</label>
                                <input type="file" id="share-file" accept=".zip,.pdf,.doc,.docx,.txt" placeholder="请选择文件">
                                <p class="file-note">支持上传的文件类型：zip、pdf、word、txt</p>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <button type="submit">提交分享</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 武汉大学国家网络安全学院</p>
        </div>
    </div>
</body>
</html>
