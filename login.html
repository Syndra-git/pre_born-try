<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 武大网安学习互助平台</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f8fa 0%, #e9f0f5 100%);
        }
        
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        
        .login-box {
            background-color: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        
        .login-box h2 {
            color: #1a56db;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        .login-box p {
            color: #4a5568;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }
        
        .form-group button {
            width: 100%;
            padding: 14px;
            background-color: #1a56db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        .form-group button:hover {
            background-color: #1543a0;
        }
        
        .switch-link {
            text-align: center;
            margin-top: 20px;
            color: #4a5568;
            font-size: 0.9em;
        }
        
        .switch-link a {
            color: #1a56db;
            text-decoration: none;
            font-weight: bold;
        }
        
        .switch-link a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #e53e3e;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }
        
        .success-message {
            color: #38a169;
            font-size: 0.85em;
            margin-top: 8px;
            display: none;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="login-box">
                <h2>武汉大学国家网络安全学院</h2>
                <p>专业学习互助平台</p>
                
                <div id="login-section" class="form-section active">
                    <div class="form-group">
                        <label for="login-name">姓名</label>
                        <input type="text" id="login-name" placeholder="请输入您的姓名">
                        <div id="login-name-error" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                        <div id="login-password-error" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <button onclick="handleLogin()">登录</button>
                    </div>
                    <div class="switch-link">
                        首次登录？<a href="#" onclick="showRegisterSection(); return false;">请先设置密码</a>
                    </div>
                </div>
                
                <div id="register-section" class="form-section">
                    <div class="form-group">
                        <label for="register-name">姓名</label>
                        <input type="text" id="register-name" placeholder="请输入您的姓名（需在名单中）">
                        <div id="register-name-error" class="error-message"></div>
                        <div id="register-name-success" class="success-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="register-password">设置密码</label>
                        <input type="password" id="register-password" placeholder="请设置密码">
                        <div id="register-password-error" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="register-confirm-password">确认密码</label>
                        <input type="password" id="register-confirm-password" placeholder="请再次输入密码">
                        <div id="register-confirm-error" class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <button onclick="handleRegister()">确认注册</button>
                    </div>
                    <div class="switch-link">
                        已有账号？<a href="#" onclick="showLoginSection(); return false;">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 武汉大学国家网络安全学院</p>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.33.1/+esm';
        import { supabaseUrl, supabaseKey } from './supabaseConfig.js';
        
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        if (isLoggedIn === 'true') {
            window.location.href = 'main.html';
        }
        
        let supabase = null;
        let useLocalStorage = true;
        
        async function testSupabaseConnection() {
            try {
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('Timeout')), 3000);
                });
                
                supabase = createClient(supabaseUrl, supabaseKey);
                
                const { data, error } = await Promise.race([
                    supabase.from('users').select('*').limit(1),
                    timeoutPromise
                ]);
                
                return !error;
            } catch {
                return false;
            }
        }
        
        testSupabaseConnection().then((connected) => {
            if (connected) {
                useLocalStorage = false;
                console.log('Supabase 连接成功');
            } else {
                console.warn('Supabase 连接失败或超时，使用本地存储模式');
                useLocalStorage = true;
            }
        }).catch(() => {
            console.warn('Supabase 连接异常，使用本地存储模式');
            useLocalStorage = true;
        });
        
        const ALLOWED_NAMES = [
            '张三', '李四', '王五', '赵六', '钱七',
            '孙八', '周九', '吴十', '郑一', '陈二',
            '测试用户'
        ];
        
        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
        }
        
        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
            document.querySelectorAll('.success-message').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
        }
        
        function showLoginSection() {
            clearErrors();
            document.getElementById('login-section').classList.add('active');
            document.getElementById('register-section').classList.remove('active');
        }
        
        function showRegisterSection() {
            clearErrors();
            document.getElementById('register-section').classList.add('active');
            document.getElementById('login-section').classList.remove('active');
        }
        
        async function checkNameInList(name) {
            if (!name.trim()) return false;
            
            if (useLocalStorage) {
                return ALLOWED_NAMES.includes(name.trim());
            }
            
            const { data, error } = await supabase
                .from('allowed_users')
                .select('name')
                .eq('name', name.trim());
            
            if (error) {
                console.error('Error checking name:', error);
                return ALLOWED_NAMES.includes(name.trim());
            }
            
            return data.length > 0;
        }
        
        async function handleLogin() {
            clearErrors();
            const name = document.getElementById('login-name').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!name) {
                showError('login-name-error', '请输入姓名');
                return;
            }
            
            if (!password) {
                showError('login-password-error', '请输入密码');
                return;
            }
            
            let user = null;
            
            if (useLocalStorage) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                user = users.find(u => u.name === name);
            } else {
                const { data, error } = await supabase
                    .from('users')
                    .select('*')
                    .eq('name', name)
                    .single();
                
                if (!error) {
                    user = data;
                }
            }
            
            if (!user) {
                showError('login-name-error', '该用户未注册，请先注册');
                return;
            }
            
            if (user.password !== password) {
                showError('login-password-error', '密码错误');
                return;
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({ name: user.name }));
            window.location.href = 'main.html';
        }
        
        async function handleRegister() {
            clearErrors();
            const name = document.getElementById('register-name').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            if (!name) {
                showError('register-name-error', '请输入姓名');
                return;
            }
            
            const isInList = await checkNameInList(name);
            if (!isInList) {
                showError('register-name-error', '您的姓名不在允许名单中，请联系管理员');
                return;
            }
            
            const successEl = document.getElementById('register-name-success');
            successEl.textContent = '姓名已核验通过';
            successEl.style.display = 'block';
            
            if (!password) {
                showError('register-password-error', '请设置密码');
                return;
            }
            
            if (password.length < 6) {
                showError('register-password-error', '密码至少需要6位');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('register-confirm-error', '两次密码输入不一致');
                return;
            }
            
            let existingUser = null;
            
            if (useLocalStorage) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                existingUser = users.find(u => u.name === name);
            } else {
                const { data, error } = await supabase
                    .from('users')
                    .select('name')
                    .eq('name', name)
                    .single();
                
                if (!error) {
                    existingUser = data;
                }
            }
            
            if (existingUser) {
                showError('register-name-error', '该用户已注册，请直接登录');
                return;
            }
            
            if (useLocalStorage) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                users.push({ name, password });
                localStorage.setItem('users', JSON.stringify(users));
            } else {
                const { error } = await supabase
                    .from('users')
                    .insert({ name, password });
                
                if (error) {
                    console.error('Error registering user:', error);
                    alert('注册失败，请重试');
                    return;
                }
            }
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify({ name }));
            window.location.href = 'main.html';
        }
        
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.showLoginSection = showLoginSection;
        window.showRegisterSection = showRegisterSection;
    </script>
</body>
</html>
