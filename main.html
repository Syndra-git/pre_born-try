<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武汉大学国家网络安全学院 - 专业学习互助平台</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // 检查登录状态
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>武汉大学国家网络安全学院</h1>
            <h2>专业学习互助平台</h2>
        </div>
        <div class="content">
            <div class="options">
                <div class="option-card">
                    <h3>学习资源查询</h3>
                    <p>浏览课程学习、实践操作、特色方向等板块，查找获取专业学习资源和经验、指导。</p>
                    <a href="resources.html">进入查询</a>
                </div>
                <div class="option-card">
                    <h3>资源分享</h3>
                    <p>根据自身学习经验，发表自己的感想、建议，供其他同学参考。</p>
                    <a href="share.html">分享资源</a>
                </div>
                <div class="option-card">
                    <h3>参与互助小组</h3>
                    <p>填写表单，与其他人相匹配，相互帮助补充不足。</p>
                    <a href="group.html">加入小组</a>
                </div>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 武汉大学国家网络安全学院</p>
        </div>
    </div>
</body>
</html>
